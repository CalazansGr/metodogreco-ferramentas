  .gauge .num{font-size:3.4rem; font-weight:900; line-height:1; color:var(--gold-light)}

  .gauge .bar > i{display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,var(--gold),var(--gold-light)); width:0; transition:width 1.1s cubic-bezier(.22,1,.36,1)}

  .cta-block{margin-top:26px; padding-top:22px; border-top:1px solid var(--gold-border)}
  .cta-line{text-align:center; font-size:.96rem; color:var(--pearl); margin-bottom:16px; line-height:1.5}

  .wa{display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:17px;

  .res-actions{display:flex; gap:10px; margin-top:12px}
  .mini{flex:1; text-align:center; padding:12px; border-radius:12px; font-size:.86rem; font-weight:600; cursor:pointer; text-decoration:none;

  .mini:hover{border-color:var(--gold); color:var(--gold)}

  .disclaimer{margin-top:18px; font-size:.72rem; line-height:1.5; color:rgba(251,249,228,.4); text-align:center}

  @keyframes fadeSlideUp{from{opacity:0; transform:translateY(18px)} to{opacity:1; transform:translateY(0)}}
  @keyframes auraPulse{0%,100%{opacity:.85; transform:scale(1)} 50%{opacity:1; transform:scale(1.07)}}

  @media(max-width:480px){
    .brand{font-size:1.55rem}
    .panel{padding:22px 18px 24px}
    .q-title{font-size:1.15rem}
    .gauge .num{font-size:2.8rem}
  }
  @media(prefers-reduced-motion:reduce){
    *{animation:none!important; transition:none!important}
    html{scroll-behavior:auto}
  }
</style>

      {id:"trabalho", type:"scale", q:"Ele consegue segurar várias informações na cabeça ao mesmo tempo?", help:"1 = facilmente · 5 = se perde com 2+ passos"},
      {id:"ritmo", type:"choice", q:"O ritmo dele é:", opts:["Rápido, mas comete erros bobos","Lento e caprichoso","Varia muito conforme o humor","Trava se for pressionado"]},
      {id:"ambiente", type:"choice", q:"Ele rende melhor:", opts:["Em silêncio total","Com um som de fundo","Em movimento / pausas frequentes","Junto de alguém acompanhando"]},
      {id:"objetivo", type:"text", q:"Quer acrescentar algo sobre como ele aprende?", help:"Opcional.", placeholder:"Ex: só entende quando associo a algo do dia a dia..."}
    ]
  },

  plano: {
    icon: I.calendar,
    title: "Plano de Estudo Personalizado",
    short: "Monte um plano semanal de estudos sob medida pra rotina do seu filho.",
    eyebrow: "O plano de estudos do seu filho",
    intro: "Conte a rotina e as matérias — eu monto um plano da semana com técnicas.",
    cta: "Quer que o Método Greco execute esse plano com seu filho?",
    waMsg: a => `Olá! Gerei um Plano de Estudo pro meu filho no site e quero ajuda do Método Greco pra colocar em prática.`,
    questions: [
      {id:"serie", type:"choice", q:"Idade / ano escolar?", opts:["6 a 9 anos","10 a 12 anos","13 a 15 anos","16 a 18 anos"]},
      {id:"materias", type:"text", q:"Quais matérias são a prioridade?", help:"Pode listar.", placeholder:"Ex: matemática, física e química"},
      {id:"nivel", type:"choice", q:"Nível atual nessas matérias:", opts:["Muito atrasado, precisa da base","Atrasado em alguns pontos","Na média","Indo bem, quer avançar"]},
      {id:"tempo", type:"choice", q:"Quanto tempo por dia dá pra estudar?", opts:["15 a 20 min","30 min","1 hora","Mais de 1 hora"]},
      {id:"dias", type:"choice", q:"Quantos dias por semana?", opts:["2 a 3 dias","4 a 5 dias","Todos os dias","Só fim de semana"]},
      {id:"foco", type:"scale", q:"Nível de foco dele estudando:", help:"1 = ótimo · 5 = se distrai muito"},
      {id:"objetivo", type:"text", q:"Qual o objetivo principal?", help:"Opcional.", placeholder:"Ex: recuperar a média / preparar pra prova / vestibular"}
    ]
  }
};

const ORDER = ["diagnostico","potencial","perfil","plano"];

/* =========================================================================
   STATE + ROUTER
   ========================================================================= */
const app = document.getElementById('app');
let state = { quiz:null, step:0, answers:{} };

function go(hash){ location.hash = hash; }
window.addEventListener('hashchange', route);

function route(){
  const h = location.hash.replace(/^#\/?/,'');
  const parts = h.split('/');
  if(parts[0] === 'quiz' && QUIZZES[parts[1]]){
    state = { quiz:parts[1], step:0, answers:{} };
    renderQuiz();
  } else {
    renderHub();
  }
  window.scrollTo({top:0, behavior:'auto'});
}

/* =========================================================================
   VIEWS
   ========================================================================= */
function renderHub(){
  let cards = ORDER.map((id,i)=>{
    const q = QUIZZES[id];
    return `<button class="tool" style="--d:${0.12+i*0.09}s" onclick="go('#/quiz/${id}')" aria-label="${q.title}">
      <span class="ic"><svg viewBox="0 0 24 24">${q.icon}</svg></span>
      <span class="txt"><span class="t">${q.title}</span><span class="s">${q.short}</span></span>
      <span class="chev"><svg viewBox="0 0 24 24">${I.chev}</svg></span>
    </button>`;
  }).join('');

  app.innerHTML = `
    <div class="brand-head">
      <div class="brand">MÉTODO <span>GRECO</span></div>
      <div class="kicker">Ferramentas para pais</div>
      <p class="lead">Entenda em minutos <b style="color:var(--pearl)">por que seu filho tem dificuldade</b> — e o que realmente funciona pra ele. Escolha uma ferramenta:</p>
    </div>
    <div class="tools">${cards}</div>
    <p class="foot-note">Ferramentas gratuitas e orientativas, criadas pelo Método Greco.<br>Não substituem avaliação profissional. <a href="https://metodogreco.site" target="_blank" rel="noopener">Site oficial</a></p>
  `;
}

function renderQuiz(){
  const q = QUIZZES[state.quiz];
  const total = q.questions.length;
  const item = q.questions[state.step];
  const pct = Math.round((state.step/total)*100);
  const val = state.answers[item.id];

  let input = '';
  if(item.type === 'choice'){
    input = `<div class="opts">` + item.opts.map((o,i)=>
      `<button class="opt ${val===o?'sel':''}" onclick="pick('${item.id}',this.dataset.v)" data-v="${o.replace(/"/g,'&quot;')}">
        <span class="dot"></span><span>${o}</span></button>`).join('') + `</div>`;
  } else if(item.type === 'scale'){
    input = `<div class="scale">` + [1,2,3,4,5].map(n=>
      `<button class="${String(val)===String(n)?'sel':''}" onclick="pick('${item.id}','${n}')">${n}</button>`).join('') + `</div>
      <div class="scale-labels"><span>Pouco</span><span>Muito</span></div>`;
  } else {
    input = `<textarea class="field" id="txt" placeholder="${item.placeholder||''}" oninput="state.answers['${item.id}']=this.value">${val||''}</textarea>`;
  }

  const canNext = item.type==='text' ? true : (val!==undefined && val!=='');
  const isLast = state.step === total-1;

  app.innerHTML = `
    <div class="panel">
      <div class="top-row">
        <button class="back-btn" onclick="prev()"><svg viewBox="0 0 24 24">${I.back}</svg>${state.step===0?'Voltar':'Anterior'}</button>
        <span class="q-counter">${state.step+1} / ${total}</span>
      </div>
      <div class="progress"><i style="width:${pct}%"></i></div>
      <div class="q-title">${item.q}</div>
      ${item.help?`<div class="q-help">${item.help}</div>`:''}
      ${input}
      <div class="nav-row">
        <button class="btn btn-gold" id="nextBtn" ${canNext?'':'disabled'} onclick="next()">
          ${isLast?'Ver resultado':'Continuar'} <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">${I.arrow}</svg>
        </button>
      </div>
    </div>`;
}

function pick(id,v){
  state.answers[id]=v;
  renderQuiz();
}
function prev(){
  if(state.step===0){ go('#/'); }
  else { state.step--; renderQuiz(); }
}
function next(){
  const q = QUIZZES[state.quiz];
  if(state.step < q.questions.length-1){ state.step++; renderQuiz(); }
  else { submit(); }
}

/* =========================================================================
   SUBMIT → Worker (com fallback)
   ========================================================================= */
const LOAD_MSGS = [
  "Analisando as respostas…",
  "Cruzando com padrões neuroeducacionais…",
  "Montando o resultado do seu filho…",
  "Quase lá…"
];
function renderLoading(){
  app.innerHTML = `<div class="panel loading">
    <div class="orb"></div>
    <h3>Gerando o resultado…</h3>
    <p id="lmsg">${LOAD_MSGS[0]}</p>
  </div>`;
  let i=0;
  const el=document.getElementById('lmsg');
  return setInterval(()=>{ i=(i+1)%LOAD_MSGS.length; if(el){el.style.opacity=0; setTimeout(()=>{el.textContent=LOAD_MSGS[i]; el.style.opacity=1;},250);} },1500);
}

async function submit(){
  const timer = renderLoading();
  const quizId = state.quiz;
  const answers = readableAnswers(quizId, state.answers);
  let result=null;
  if(WORKER_URL){
    try{
      const ctrl = new AbortController();
      const to = setTimeout(()=>ctrl.abort(), 25000);
      const r = await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({quizId,answers}),signal:ctrl.signal});
      clearTimeout(to);
      if(r.ok){ const d=await r.json(); result = d.resultado || d.result || null; }
    }catch(e){ /* cai no fallback */ }
  }
  if(!result) result = fallbackResult(quizId, state.answers);
  clearInterval(timer);
  renderResult(quizId, result);
}

/* converte respostas em texto legível pro prompt */
function readableAnswers(quizId, ans){
  const q = QUIZZES[quizId];
  return q.questions.map(it=>{
    let v = ans[it.id];
    if(v===undefined||v==='') v='(não respondeu)';
    if(it.type==='scale') v = v+'/5';
    return `${it.q} → ${v}`;
  }).join('\n');
}

/* =========================================================================
   RESULT
   ========================================================================= */
function renderResult(quizId, text){
  const q = QUIZZES[quizId];
  const waLink = `https://wa.me/${WHATS}?text=`+encodeURIComponent(q.waMsg(state.answers));

  // gauge só pro quiz de potencial
  let gauge='';
  if(quizId==='potencial'){
    const p = potentialPct(state.answers);
    gauge = `<div class="gauge">
      <div class="num">${p}%</div>
      <div class="bar"><i id="gbar"></i></div>
      <div class="cap">do potencial em matemática sendo usado hoje</div>
    </div>`;
    setTimeout(()=>{const b=document.getElementById('gbar'); if(b)b.style.width=p+'%';},120);
  }

  // título do perfil (1ª linha do texto se vier marcada com #)
  let title = q.eyebrow, body = text;
  const m = text.match(/^#\s*(.+)\n?/);
  if(m){ title = m[1].trim(); body = text.slice(m[0].length); }

  app.innerHTML = `
    <div class="panel">
      <div class="res-badge">
        <div class="eyebrow">${q.eyebrow}</div>
        <h2>${escapeHtml(title)}</h2>
      </div>
      ${gauge}
      <div class="res-body">${mdLite(body)}</div>
      <div class="cta-block">
        <div class="cta-line"><b>${q.cta}</b></div>
        <a class="wa" href="${waLink}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M.06 24l1.7-6.2A11.9 11.9 0 0 1 .14 11.9C.14 5.3 5.5 0 12.07 0a11.8 11.8 0 0 1 8.4 3.5 11.8 11.8 0 0 1 3.5 8.4c0 6.6-5.4 11.9-11.9 11.9a12 12 0 0 1-5.7-1.5L.06 24zm6.6-3.8c1.7 1 3.3 1.6 5.4 1.6 5.5 0 9.9-4.4 9.9-9.9a9.9 9.9 0 0 0-16.9-7 9.9 9.9 0 0 0-1.5 12.1l-1 3.7 3.8-1zM17.5 14.4c-.1-.1-.3-.2-.6-.4-.3-.1-1.8-.9-2-1-.3-.1-.5-.1-.7.1-.2.3-.7 1-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.6l.5-.5c.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5l-.9-2.2c-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.1.2 2.1 3.3 5.2 4.6.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.3-.7.3-1.3.2-1.4z"/></svg>
          Falar com o Método Greco
        </a>
        <div class="res-actions">
          <a class="mini" href="https://metodogreco.site" target="_blank" rel="noopener">Conhecer o método</a>
          <button class="mini" onclick="go('#/')">Fazer outro quiz</button>
        </div>
      </div>
      <p class="disclaimer">Resultado orientativo e educacional, gerado a partir das suas respostas. Não substitui avaliação psicopedagógica ou médica.</p>
    </div>`;
}

/* % estimado do potencial (fallback determinístico) */
function potentialPct(a){
  // quanto maior bloqueio/menor método/menor confiança => mais potencial OCIOSO (uso menor)
  const bloqueio=+a.bloqueio||3, metodo=+a.metodo||3, conf=+a.confianca||3;
  let usado = 100 - ((bloqueio+metodo+conf)/15)*62; // 38–100
  if(a.capacidade && a.capacidade.startsWith('Aprende rapid')) usado-=8;
  if(a.nota && a.nota.startsWith('Vermelha')) usado-=6;
  return Math.max(22, Math.min(82, Math.round(usado)));
}

/* =========================================================================
   FALLBACK (sem IA) — resultados templated por quiz
   ========================================================================= */
function fallbackResult(quizId, a){
  if(quizId==='diagnostico') return fbDiagnostico(a);
  if(quizId==='potencial')   return fbPotencial(a);
  if(quizId==='perfil')      return fbPerfil(a);
  if(quizId==='plano')       return fbPlano(a);
  return "Não foi possível gerar o resultado agora. Fale com a gente no WhatsApp.";
}

function fbDiagnostico(a){
  const foco=+a.foco||3, mem=+a.memoria||3;
  let causa = "uma combinação de base não consolidada e falta de um método claro de estudo";
  if(a.perfil && a.perfil.includes('TDAH')) causa="um perfil com forte componente atencional — o conteúdo até entra, mas a atenção não sustenta o tempo necessário pra fixar";
  else if(a.perfil && a.perfil.includes('autista')) causa="um perfil que precisa de previsibilidade, passos concretos e poucos estímulos competindo ao mesmo tempo";
  else if(a.perfil && a.perfil.includes('ansiedade')) causa="um bloqueio emocional: a capacidade existe, mas o medo de errar trava o raciocínio na hora H";
  else if(foco>=4) causa="dificuldade de sustentar a atenção: ele entende, mas se dispersa antes de consolidar";
  else if(mem>=4) causa="memória de trabalho sobrecarregada: ele aprende, mas esquece porque o conteúdo não foi fixado da forma certa";

  let abordagem = "passos curtos, revisão espaçada e muita prática guiada, com retorno imediato pra ele não acumular dúvida";
  if(a.erro && a.erro.includes('burro')) abordagem="reconstruir a autoconfiança ANTES do conteúdo: pequenas vitórias diárias pra ele voltar a acreditar que é capaz";

  return `# Diagnóstico do seu filho
Pelas suas respostas, a dificuldade do seu filho **não é falta de inteligência** — é ${causa}.

## Por que isso acontece
Matemática é cumulativa: cada buraco na base derruba o que vem depois. Quando some ${foco>=4?'a dificuldade de foco':'a ausência de um método'} ${mem>=4?'e a dificuldade de reter o conteúdo':''}, o resultado é o que você descreveu — esforço sem resultado, e a sensação de que "não leva jeito".

## O que funciona pra esse perfil
- ${abordagem}
- Diagnóstico do ponto exato onde a base quebrou (e voltar ali, sem pular)
- Ensino adaptado ao ritmo dele, não ao ritmo da turma
- Reduzir a ansiedade transformando erro em parte natural do processo

## O caminho
Esse perfil melhora rápido quando o ensino para de ser genérico e passa a ser sob medida. É exatamente isso que o **Método Greco** faz: encontra onde travou, reconstrói a base e devolve a confiança do seu filho com a matemática.`;
}

function fbPotencial(a){
  const p = potentialPct(a);
  const ocioso = 100-p;
  return `# Seu filho usa ~${p}% do potencial dele
Isso significa que cerca de **${ocioso}% da capacidade real dele está parada** — não por falta de talento, mas por falta das condições certas.

## A explicação neurocientífica
O cérebro aprende por conexões. Quando há bloqueio emocional, ausência de método ou base furada, o cérebro gasta energia com ansiedade e esforço desorganizado — sobra pouco pra aprender de verdade. O potencial existe; ele só não está sendo canalizado.

## A boa notícia
Esses ${ocioso}% não estão perdidos — estão **adormecidos**. Com o estímulo e o método corretos, esse potencial ocioso é justamente o que mais rápido se converte em resultado.

## Como destravar
- Remover o bloqueio (autoconfiança vem antes do conteúdo)
- Dar um método claro e passos do tamanho dele
- Reconstruir a base nos pontos certos
O **Método Greco** existe pra destravar exatamente esse potencial.`;
}

function fbPerfil(a){
  let nome="O Aprendiz Equilibrado", desc="aprende por vários caminhos", dica="variar formatos: ver, ouvir e praticar o mesmo conteúdo";
  const e=a.entende||'';
  if(e.startsWith('Vê')){ nome="O Aprendiz Visual"; desc="pensa por imagens — entende quando vê esquemas, cores e desenhos"; dica="mapas mentais, gráficos coloridos e diagramas em vez de blocos de texto"; }
  else if(e.startsWith('Alguém')){ nome="O Aprendiz Auditivo"; desc="aprende pela fala — fixa melhor ouvindo e explicando em voz alta"; dica="explicar o conteúdo em voz alta, áudios e 'ensinar' alguém"; }
  else if(e.startsWith('Faz')){ nome="O Aprendiz Prático (Cinestésico)"; desc="aprende fazendo — precisa de exemplos concretos e mão na massa"; dica="resolver muitos exercícios reais e associar à vida dele"; }
  else if(e.startsWith('Lê')){ nome="O Aprendiz Reflexivo"; desc="aprende lendo com calma e no próprio ritmo"; dica="resumos escritos e tempo pra processar sem pressão"; }
  const wm=+a.trabalho||3;
  const memNote = wm>=4 ? "\n\n## Atenção importante\nEle tende a se perder quando há **vários passos de uma vez** (memória de trabalho mais curta). Quebrar tudo em micro-passos muda completamente o resultado." : "";

  return `# ${nome}
O seu filho ${desc}. Saber disso muda tudo: ele não é "ruim de aprender", ele só aprende de um jeito que a escola raramente respeita.

## Como ele rende mais
- Use ${dica}
- Respeite o ritmo natural dele
- Conecte a matemática ao mundo real dele${memNote}

## Por que isso importa
Quando o ensino fala a "língua" do cérebro do seu filho, o que era sofrimento vira fluência. O **Método Greco** adapta o ensino exatamente a esse perfil.`;
}

function fbPlano(a){
  const tempo=a.tempo||"30 min", dias=a.dias||"4 a 5 dias", mat=a.materias||"as matérias prioritárias";
  return `# Plano de estudos do seu filho
Montado pra rotina de **${tempo}/dia, ${dias.toLowerCase()}**, focando em ${mat}.

## Estrutura da semana
- **Dia 1 e 2 — Base:** revisar o conteúdo atual em passos curtos, sem pular etapas
- **Dia 3 — Prática:** exercícios do mais fácil ao difícil (vitórias primeiro)
- **Dia 4 — Revisão espaçada:** retomar o que viu nos dias anteriores
- **Dia 5 — Desafio leve:** um problema novo pra aplicar o que aprendeu

## Técnicas que funcionam
- Blocos curtos com pausa (foco rende mais em sprints)
- Revisão espaçada pra fixar de verdade (vence o "esqueci tudo")
- Ensinar em voz alta o que aprendeu (teste real de domínio)
- Corrigir o erro na hora, sem deixar acumular

## Próximo passo
Um plano só funciona com execução e ajuste constante. Quer que o **Método Greco** coloque esse plano em prática com o seu filho, ajustando semana a semana?`;
}

/* =========================================================================
   HELPERS
   ========================================================================= */
function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function mdLite(t){
  const lines = String(t).replace(/\r/g,'').split('\n');
  let html='', inList=false;
  for(let raw of lines){
    let line=raw.trim();
    if(!line){ if(inList){html+='</ul>';inList=false;} continue; }
    line = escapeHtml(line).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    if(line.startsWith('## ')){ if(inList){html+='</ul>';inList=false;} html+='<h4>'+line.slice(3)+'</h4>'; }
    else if(line.startsWith('- ')){ if(!inList){html+='<ul>';inList=true;} html+='<li>'+line.slice(2)+'</li>'; }
    else { if(inList){html+='</ul>';inList=false;} html+='<p>'+line+'</p>'; }
  }
  if(inList) html+='</ul>';
  return html;
}

/* init */
route();
